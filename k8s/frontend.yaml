apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-server-frontend
  namespace: statex-apps
  labels:
    app: database-server-frontend
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database-server-frontend
  template:
    metadata:
      labels:
        app: database-server-frontend
    spec:
      containers:
      - name: app
        image: localhost:5000/database-server-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3390
          name: http
        env:
        - name: PORT
          value: "3390"
        - name: FRONTEND_PORT
          value: "3390"
        - name: NODE_ENV
          value: production
        - name: SERVICE_NAME
          value: database-server
        - name: DOMAIN
          value: database-server.alfares.cz
        - name: DEFAULT_DOMAIN_SUFFIX
          value: alfares.cz
        - name: AUTH_SERVICE_URL
          value: http://auth-microservice:3370
        - name: AUTH_SERVICE_PUBLIC_URL
          value: https://auth.alfares.cz
        - name: DB_SERVER_POSTGRES_HOST
          value: db-server-postgres
        - name: DB_SERVER_PORT
          value: "5432"
        - name: DB_SERVER_REDIS_HOST
          value: db-server-redis
        - name: REDIS_SERVER_PORT
          value: "6379"
        envFrom:
        - secretRef:
            name: database-server-frontend-secret
            optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: 3390
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3390
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: database-server-frontend
  namespace: statex-apps
  labels:
    app: database-server-frontend
    managed-by: k8s-migration
spec:
  selector:
    app: database-server-frontend
  ports:
  - port: 3390
    targetPort: 3390
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: database-server-frontend
  namespace: statex-apps
  labels:
    app: database-server-frontend
    managed-by: k8s-migration
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
  - host: database-server.alfares.cz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: database-server-frontend
            port:
              number: 3390
  tls:
  - hosts:
    - database-server.alfares.cz
    secretName: database-server-frontend-tls
