# PostgreSQL + Redis for statex-apps when Docker db-server is unavailable.
# Uses hostNetwork so pods and external configs can reach 192.168.88.53:5432 / :6379.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-server-postgres-pvc
  namespace: statex-apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-server-redis-pvc
  namespace: statex-apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-server-postgres
  namespace: statex-apps
  labels:
    app: db-server-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: db-server-postgres
  template:
    metadata:
      labels:
        app: db-server-postgres
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: pg
          envFrom:
            - secretRef:
                name: db-server-postgres-env
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -d "${POSTGRES_DB:-postgres}"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            limits:
              memory: "1536Mi"
              cpu: "1500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-server-postgres-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-server-redis
  namespace: statex-apps
  labels:
    app: db-server-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: db-server-redis
  template:
    metadata:
      labels:
        app: db-server-redis
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: redis
          image: redis:7
          command:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            limits:
              memory: "384Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-server-redis-pvc
